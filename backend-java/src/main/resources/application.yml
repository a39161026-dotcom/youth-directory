spring:
  application:
    name: wooriban-backend

  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:wooriban}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8000}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-string-in-production-please}
    access-token-expiration-ms: 21600000
    refresh-token-expiration-ms: 2592000000
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
